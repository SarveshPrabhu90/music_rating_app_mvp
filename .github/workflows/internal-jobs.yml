name: Internal Jobs

on:
  schedule:
    - cron: "0 * * * *"
    - cron: "15 8 * * 1"
  workflow_dispatch:

jobs:
  refresh-recommendations:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger recommendation refresh job
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/api/internal/jobs/recommendations" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"limit": 200}'

  generate-weekly-recaps:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 8 * * 1'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly recap job
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/api/internal/jobs/weekly-recaps" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"limit": 500}'

  dispatch-recommendation-push:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    needs:
      - refresh-recommendations
    runs-on: ubuntu-latest
    steps:
      - name: Trigger recommendation push dispatch job
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/api/internal/jobs/push-dispatch" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"campaign":"recommendations","limit":500,"sinceHours":4}'

  dispatch-weekly-recap-push:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 8 * * 1'
    needs:
      - generate-weekly-recaps
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly recap push dispatch job
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X POST "$APP_BASE_URL/api/internal/jobs/push-dispatch" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json" \
            -d '{"campaign":"weekly_recap","limit":500,"sinceHours":192}'

  verify-recommendations-health:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 * * * *'
    needs:
      - refresh-recommendations
    runs-on: ubuntu-latest
    steps:
      - name: Verify recommendations health
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X GET "$APP_BASE_URL/api/internal/jobs/health" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json"

  verify-weekly-recaps-health:
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '15 8 * * 1'
    needs:
      - generate-weekly-recaps
    runs-on: ubuntu-latest
    steps:
      - name: Verify weekly recap health
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          INTERNAL_JOB_SECRET: ${{ secrets.INTERNAL_JOB_SECRET }}
        run: |
          test -n "$APP_BASE_URL"
          test -n "$INTERNAL_JOB_SECRET"
          curl --fail --show-error --silent \
            -X GET "$APP_BASE_URL/api/internal/jobs/health" \
            -H "Authorization: Bearer $INTERNAL_JOB_SECRET" \
            -H "Content-Type: application/json"